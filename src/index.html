<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TechEvent</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container py-4">

    <div class="text-center mb-4">
        <h1 class="fw-bold">🎤 TechEvent</h1>
        <p class="text-muted">Gestión de eventos tecnológicos</p>
    </div>

    <!-- FORMULARIO -->
    <div class="card shadow p-4 mb-4">

        <h4 class="mb-3">Registrar Evento</h4>

        <div class="row g-3">

            <div class="col-md-6">
                <input type="text" id="nombre" class="form-control" placeholder="Nombre del evento">
            </div>

            <div class="col-md-6">
                <input type="text" id="tipo" class="form-control" placeholder="Tipo (Conferencia, Hackathon)">
            </div>

            <div class="col-md-6">
                <input type="date" id="fecha" class="form-control">
            </div>

            <div class="col-md-6">
                <input type="number" id="capacidad" class="form-control" placeholder="Capacidad">
            </div>

            <div class="col-md-12">
                <select id="ponente" class="form-select">
                    <option value="">Seleccione un ponente</option>
                </select>
            </div>

            <div class="col-md-12">
                <button onclick="guardarEvento()" class="btn btn-primary w-100">
                    Guardar Evento
                </button>
            </div>

        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow p-4">

        <h4 class="mb-3">Lista de Eventos</h4>

        <div class="table-responsive">
            <table class="table table-striped table-hover text-center">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Evento</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                        <th>Capacidad</th>
                        <th>Ponente</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="tablaEventos"></tbody>

            </table>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
